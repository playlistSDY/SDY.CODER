services:
  backend:
    image: ${BACKEND_IMAGE:-web-vscode-backend:latest}
    build:
      context: .
      dockerfile: ${BACKEND_DOCKERFILE:-backend/Dockerfile}
    container_name: web-vscode-backend
    environment:
      PORT: "3001"
      RUN_TIMEOUT_MS: "30000"
      SANDBOX_PROVIDER: "docker"
      SANDBOX_IMAGE: "${BACKEND_IMAGE:-web-vscode-backend:latest}"
      SANDBOX_CPU_LIMIT: "1.0"
      SANDBOX_MEMORY_LIMIT: "512m"
      SANDBOX_PIDS_LIMIT: "128"
      JAVA_DEFAULT_CLASSPATH: "/usr/share/java/gson.jar:/usr/share/java/commons-lang3.jar:/usr/share/java/commons-math3.jar:/usr/share/java/ejml-all.jar"
      DATA_DIR: "/data"
      SQLITE_DB_PATH: "/data/app.db"
      GOOGLE_CLIENT_ID: "121210300536-58p18oet7no98r53d9vch4j4sfh0glea.apps.googleusercontent.com"
      SESSION_SECRET: "09asd-as8askdjlk-asdasd898-as99ksaldj"
    expose:
      - "3001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - backend_data:/data
    restart: unless-stopped

  frontend:
    image: web-vscode-frontend:latest
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: web-vscode-frontend
    depends_on:
      - backend
    ports:
      - "5403:80"
    restart: unless-stopped

volumes:
  backend_data:
